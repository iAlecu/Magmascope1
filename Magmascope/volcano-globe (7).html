/* =================================================================
   2. GLOBE INITIALIZATION
   ================================================================= */

/**
 * Build and configure the Globe.gl instance.
 * @param {HTMLElement} mount - element to render into
 * @param {Array} volcanoes  - dataset
 * @returns {Object} the live Globe instance
 */
function initGlobe(mount, volcanoes) {
  const globe = Globe()(mount)
    // Earth textures: NASA Blue Marble (real-color satellite imagery) +
    // topology bump for elevation. Background is night-sky stars.
    // These are the original three-globe sample assets — served from
    // unpkg with proper CORS headers, which is critical because WebGL
    // needs to read the texture pixels into the GPU.
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')

    // Soft warm atmosphere — keeps the magma theme alive against the
    // colorful Earth without overpowering the blues and greens.
    .atmosphereColor('#ffb38a')
    .atmosphereAltitude(0.16)

    .showGraticules(false);

  /* ----- VOLCANO CONE MARKERS -----
     Real 3D meshes (not flat point sprites) — each volcano is rendered
     as a small ConeGeometry: brown rocky body, glowing red-orange peak.
     Stored in a Map keyed by volcano id so we can update materials on
     hover/filter without rebuilding the whole layer. */

  // Cached materials — re-use across all instances for performance
  const bodyMaterial = new THREE.MeshLambertMaterial({
    color: 0x4a2818,         // dark volcanic basalt brown
    emissive: 0x1a0a05,      // a touch of inner warmth
    emissiveIntensity: 0.3,
    flatShading: true        // gives the cones a faceted, geological feel
  });

  /* PEAK COLOR BY STATUS
     The glowing top of each cone encodes the volcano's status — the
     bright spot the eye locks onto first. Rings continue to encode
     VEI magnitude, so the two visual channels stay independent: peak
     color = "is it dangerous now?", ring intensity = "how bad could
     it be?". */
  const STATUS_PALETTE = {
    Active:  { core: 0xff5722, glow: 0xff8c42 },  // bright magma red
    Dormant: { core: 0x00e5ff, glow: 0x4dd0e1 },  // electric cyan
    Extinct: { core: 0x9e9e9e, glow: 0xbdbdbd },  // ghostly grey
  };
  /* The "locked-on" state — used to highlight a volcano that the user
     has just navigated to via search. A vivid white-hot core with a
     gold halo, distinct from any of the status colors. */
  const LOCKED_PEAK = { core: 0xffffff, glow: 0xffd54f };

  function makePeakMaterials(palette) {
    return {
      core: new THREE.MeshBasicMaterial({
        color: palette.core,
        transparent: true,
        opacity: 0.95
      }),
      glow: new THREE.MeshBasicMaterial({
        color: palette.glow,
        transparent: true,
        opacity: 0.4,
        side: THREE.BackSide
      })
    };
  }
  // Pre-build one shared material pair per status (and one for "locked")
  const STATUS_MATERIALS = Object.fromEntries(
    Object.entries(STATUS_PALETTE).map(([k, v]) => [k, makePeakMaterials(v)])
  );
  const LOCKED_MATERIALS = makePeakMaterials(LOCKED_PEAK);

  // Expose materials to module scope so lockVolcano/unlockVolcano —
  // which live outside this closure — can swap them.
  STATUS_MATERIALS_REF = STATUS_MATERIALS;
  LOCKED_MATERIALS_REF = LOCKED_MATERIALS;

  /**
   * Build a single volcano marker — a parent group containing:
   *   1. The brown cone body (the mountain itself)
   *   2. A bright red-orange cap (the glowing crater)
   *   3. A larger transparent halo around the cap (the glow effect)
   *
   * Notable volcanoes get scaled up ~1.4x so they read as more prominent.
   * The whole group is later positioned + oriented by the customLayer
   * machinery so it stands "up" on the globe surface.
   */
  /* ----- IMPORTANCE & ZOOM SCALING -----
     Two factors drive how big a volcano appears on the globe:

     1. IMPORTANCE — derived from VEI (Volcanic Explosivity Index) +
        whether it's notable. VEI is logarithmic in real life (each
        step is ~10x more energy released), so we use a power
        function for visual emphasis rather than a linear one.
        Tambora (VEI 7) reads as a "supervolcano hub"; Pâclele Mici
        (VEI 0) reads as a tiny pip — until you get close.

     2. ZOOM — at far zoom, cones are scaled UP so they're visible
        from space and the dataset reads as a constellation of
        prominent peaks. As the camera flies in, cones SHRINK toward
        their base size — at close range, real geographic spacing
        becomes visible and exaggeration would make them dominate
        the frame. (This inverts the typical "bloom on approach"
        pattern; here, cones bloom on retreat.)
        At alt ≈ 4 (max far), zoomFactor ≈ 4×; at alt ≈ 0.4 (close),
        zoomFactor ≈ 1× (true base size). */
  const importanceFactor = (d) => {
    const veiBoost = Math.pow((d.vei || 0) + 1, 1.4) * 0.18;
    const baseSize  = d.notable ? 0.5 : 0.32;
    return baseSize + veiBoost;     // ranges roughly 0.50 → 2.4
  };

  function buildVolcanoMarker(d) {
    const group = new THREE.Group();
    group.userData = d;
    group.userData._importance = importanceFactor(d);

    const importance = group.userData._importance;
    const bodyHeight = 1.1 * importance;     // shrunk from 1.6 — overall ~30% smaller
    const bodyRadius = 0.4 * importance;     // shrunk from 0.55

    // Pick the peak material pair based on status (defaults to Active
    // if the data uses some other label like "Long dormant" etc.)
    const mats = STATUS_MATERIALS[d.status] || STATUS_MATERIALS.Active;

    // 1. Cone body — chunky polygonal mountain
    const body = new THREE.Mesh(
      new THREE.ConeGeometry(bodyRadius, bodyHeight, 8, 1, false),
      bodyMaterial
    );
    body.position.y = bodyHeight / 2;
    group.add(body);

    // 2. Glowing peak — small bright sphere, status-colored
    const peak = new THREE.Mesh(
      new THREE.SphereGeometry(0.15 * importance, 12, 12),     // shrunk from 0.20
      mats.core
    );
    peak.position.y = bodyHeight + 0.04;
    peak.userData._role = 'peak';   // tagged so we can swap material later
    group.add(peak);

    // 3. Halo — soft outer glow, status-colored
    const halo = new THREE.Mesh(
      new THREE.SphereGeometry(0.30 * importance, 16, 16),     // shrunk from 0.40
      mats.glow
    );
    halo.position.y = bodyHeight + 0.04;
    halo.userData._role = 'halo';
    group.add(halo);

    return group;
  }

  /**
   * Compute the zoom-aware scale multiplier from camera distance.
   * Inverse of the typical "bloom on approach" — here cones are
   * largest at far zoom (so the constellation reads from space) and
   * shrink toward their true base size as the camera approaches.
   * Clamped against bad camera state during transitions to keep
   * cones from ever vanishing.
   */
  function computeZoomFactor() {
    const camDist = activeGlobe ? activeGlobe.camera().position.length() / 100
                                : globe.camera().position.length() / 100;
    if (!isFinite(camDist) || camDist <= 0) return 1;
    // Linear ramp: camDist 1 → factor 1 (base); camDist 4 → factor 4
    // (large from space). Clamped to [1, 4.5].
    return Math.max(1, Math.min(4.5, camDist));
  }

  globe
    .customLayerData(volcanoes)
    .customThreeObject(buildVolcanoMarker)
    .customThreeObjectUpdate((obj, d) => {
      if (!d || d.lat === undefined || d.lng === undefined) return;
      // Guard against globe.getCoords returning bad values during init
      const coords = globe.getCoords(d.lat, d.lng, 0.005);
      if (!coords || !isFinite(coords.x)) return;
      // Position on globe surface with outward-sprouting orientation
      Object.assign(obj.position, coords);
      obj.lookAt(0, 0, 0);
      obj.rotateX(-Math.PI / 2);
      obj.scale.setScalar(computeZoomFactor());
    });

  /* When the user zooms, re-fire customThreeObjectUpdate so all
     cones re-scale. We throttle to the next animation frame so a
     fast scroll wheel doesn't run this 60+ times per second. */
  let zoomRefreshQueued = false;
  globe.controls().addEventListener('change', () => {
    if (zoomRefreshQueued) return;
    zoomRefreshQueued = true;
    requestAnimationFrame(() => {
      zoomRefreshQueued = false;
      const zoomFactor = computeZoomFactor();
      globe.scene().traverse((obj) => {
        if (obj.userData && obj.userData.lat !== undefined &&
            obj.userData._importance !== undefined) {
          obj.scale.setScalar(zoomFactor);
        }
      });
      // Cluster overlay also responds to camera distance — fades in
      // at overview altitude, fades out as the user dives in.
      updateClusterVisibility();
    });
  });

  /* ----- HOVER + CLICK HANDLING -----
     customLayer doesn't ship with hover/click out of the box, so we
     wire up our own raycaster against the underlying Three.js scene.
     This gives us tooltips and click-to-fly behavior identical to
     what the points API used to provide. */

  const raycaster = new THREE.Raycaster();
  const mouseNDC = new THREE.Vector2();
  let hoveredVolcano = null;
  const tooltipEl = document.createElement('div');
  tooltipEl.className = 'globe-tooltip-container';
  tooltipEl.style.cssText = 'position:fixed;pointer-events:none;z-index:5;display:none;';
  document.body.appendChild(tooltipEl);

  function pickVolcano(clientX, clientY) {
    const rect = mount.getBoundingClientRect();
    mouseNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
    mouseNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseNDC, globe.camera());

    // Cast against the whole scene and walk up the parent chain on
    // each hit until we find an object tagged with volcano userData.
    // This is robust to Globe.gl's internal scene layout.
    const hits = raycaster.intersectObjects(globe.scene().children, true);
    for (const hit of hits) {
      let obj = hit.object;
      while (obj) {
        if (obj.userData && obj.userData.lat !== undefined) {
          return obj.userData;
        }
        obj = obj.parent;
      }
    }
    return null;
  }

  mount.addEventListener('mousemove', (e) => {
    // If the cursor is over a cluster marker or popup, suppress the
    // cone tooltip — those elements have their own visual treatment.
    if (e.target.closest('.cluster-marker') ||
        e.target.closest('.cluster-popup')) {
      if (hoveredVolcano) {
        hoveredVolcano = null;
        tooltipEl.style.display = 'none';
      }
      return;
    }
    const v = pickVolcano(e.clientX, e.clientY);
    if (v) {
      hoveredVolcano = v;
      mount.style.cursor = 'pointer';
      tooltipEl.style.display = 'block';
      tooltipEl.style.left = (e.clientX + 14) + 'px';
      tooltipEl.style.top  = (e.clientY - 8)  + 'px';
      tooltipEl.innerHTML = `
        <div class="globe-tooltip">
          <span class="tt-label">${v.notable ? '◆ ' + t('tooltip.notable') : t('tooltip.regular')}</span>
          ${v.name}
        </div>`;
    } else if (hoveredVolcano) {
      hoveredVolcano = null;
      mount.style.cursor = 'grab';
      tooltipEl.style.display = 'none';
    }
  });
  mount.addEventListener('click', (e) => {
    // Don't process canvas clicks that originated from a cluster
    // marker or popup — those have their own handlers and should
    // never fall through to a cone selection.
    if (e.target.closest('.cluster-marker') ||
        e.target.closest('.cluster-popup')) return;
    const v = pickVolcano(e.clientX, e.clientY);
    if (v) handleVolcanoClick(v);
  });
  mount.addEventListener('mouseleave', () => {
    tooltipEl.style.display = 'none';
    hoveredVolcano = null;
  });

  /* ----- SEISMIC PULSE RINGS -----
     Rings expand outward FLAT ON THE GLOBE'S SURFACE — like seismic
     shockwaves rippling across the ground. Each ring's character is
     driven by VEI:
       VEI 7+   cataclysmic  large fast pulses, hot magma red
       VEI 4-6  significant  medium amber pulses
       VEI 0-3  minor        small subtle white pulses
     This gives the most dangerous sites a "heartbeat" you can spot
     from space, while smaller volcanoes whisper. */

  const RING_STYLE = (d) => {
    const v = d.vei || 0;
    if (v >= 7) return {
      color:  [255, 87, 34],   // magma red — global-impact volcanoes
      radius: 6.0,
      speed:  3.5,
      period: 1100,
      alphaMax: 1.0
    };
    if (v >= 4) return {
      color:  [255, 193,  7],  // amber — regional impact
      radius: 3.5,
      speed:  2.2,
      period: 1700,
      alphaMax: 0.85
    };
    return {                   // localized — quiet white pulse
      color:  [255, 255, 255],
      radius: 1.8,
      speed:  1.4,
      period: 2400,
      alphaMax: 0.4
    };
  };

  globe
    .ringsData([])               // start empty — no pinging until search happens
    .ringLat('lat')
    .ringLng('lng')
    .ringMaxRadius(d => RING_STYLE(d).radius)
    .ringPropagationSpeed(d => RING_STYLE(d).speed)
    .ringRepeatPeriod(d => RING_STYLE(d).period)
    .ringColor(d => {
      const s = RING_STYLE(d);
      const [r, g, b] = s.color;
      return t => `rgba(${r}, ${g}, ${b}, ${(1 - t) * s.alphaMax})`;
    })
    .ringAltitude(0.005);    // flat on the surface — horizontal shockwave

  /* ============================================================
     CLUSTER OVERLAY LAYER
     ------------------------------------------------------------
     Solves the "too many cones in Iceland" problem at overview
     altitude without compromising the inspection experience:

       - Volcanoes within ~400 km of each other group into clusters,
         computed once at startup.
       - At far zoom, cluster markers (HTML elements with count
         badges) appear over the regions; individual cones underneath
         are too small to read at that distance anyway.
       - As the camera flies in, clusters fade out and individual
         cones bloom — the existing zoom-bloom logic handles the
         cones, this layer just handles cluster opacity.

     This is purely additive — the cone layer underneath is unchanged,
     so search, lock-on, HUD, and direct cone clicks all keep working.
     ============================================================ */

  /**
   * Haversine great-circle distance in kilometers between two points.
   * Earth radius averaged at 6371 km. Sufficient precision for the
   * ~400 km clustering threshold we care about.
   */
  function haversineKm(lat1, lng1, lat2, lng2) {
    const toRad = d => d * Math.PI / 180;
    const R = 6371;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
              Math.sin(dLng/2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  /**
   * Greedy spatial clustering. Walks volcanoes in order; for each,
   * checks if it falls within `thresholdKm` of any existing cluster's
   * centroid. If yes, joins that cluster and updates the centroid.
   * If no, starts a new cluster.
   *
   * Centroids are weighted by (vei + 1) so a cluster containing a
   * supervolcano is anchored closer to it — keeps the cluster marker
   * visually associated with the most important member.
   *
   * Returns an array of clusters: { lat, lng, members, regionLabel }.
   */
  function buildClusters(volcanoes, thresholdKm = 400) {
    const clusters = [];
    for (const v of volcanoes) {
      let joined = null;
      for (const c of clusters) {
        if (haversineKm(v.lat, v.lng, c.lat, c.lng) <= thresholdKm) {
          joined = c;
          break;
        }
      }
      if (joined) {
        joined.members.push(v);
        // Recompute weighted centroid
        const totalW = joined.members.reduce((s, m) => s + (m.vei || 0) + 1, 0);
        joined.lat = joined.members.reduce((s, m) =>
          s + m.lat * ((m.vei || 0) + 1), 0) / totalW;
        joined.lng = joined.members.reduce((s, m) =>
          s + m.lng * ((m.vei || 0) + 1), 0) / totalW;
      } else {
        clusters.push({ lat: v.lat, lng: v.lng, members: [v] });
      }
    }
    // Tag a region label for display. Strategy:
    //   1. If all members share the same `region` (state/province/range),
    //      use that — most specific and informative.
    //   2. Otherwise use the most common country, BUT if multiple
    //      clusters end up with the same country label, we'll
    //      disambiguate them in step 3 below using the dominant region.
    for (const c of clusters) {
      const regions = {};
      const countries = {};
      for (const m of c.members) {
        regions[m.region] = (regions[m.region] || 0) + 1;
        countries[m.country] = (countries[m.country] || 0) + 1;
      }
      const topRegion = Object.entries(regions)
        .sort((a, b) => b[1] - a[1])[0][0];
      const topCountry = Object.entries(countries)
        .sort((a, b) => b[1] - a[1])[0][0];
      c._topRegion = topRegion;
      c._topCountry = topCountry;
      // Default to country; we'll resolve duplicates in pass 2
      c.regionLabel = topCountry;
    }
    // Pass 2 — disambiguate any country labels that appear more than once.
    // If two clusters both said "United States", they need to become
    // "Cascades" and "Alaska" (or whatever their dominant region is).
    const labelCounts = {};
    for (const c of clusters) labelCounts[c.regionLabel] = (labelCounts[c.regionLabel] || 0) + 1;
    for (const c of clusters) {
      if (labelCounts[c.regionLabel] > 1) {
        c.regionLabel = c._topRegion || c.regionLabel;
      }
    }
    // Pass 3 — if region labels are also duplicated (e.g., two
    // separate "Alaska" clusters), suffix with the highest-VEI
    // member's name to make them unique. This catches edge cases
    // where the simple country/region heuristic isn't enough.
    const labelCounts2 = {};
    for (const c of clusters) labelCounts2[c.regionLabel] = (labelCounts2[c.regionLabel] || 0) + 1;
    for (const c of clusters) {
      if (labelCounts2[c.regionLabel] > 1) {
        const headliner = c.members.slice().sort(
          (a, b) => (b.vei || 0) - (a.vei || 0)
        )[0];
        c.regionLabel = `${c.regionLabel} · ${headliner.name}`;
      }
    }
    // Only return clusters with 2+ members. Singletons would be just
    // a redundant overlay over an existing cone.
    return clusters.filter(c => c.members.length >= 2);
  }

  const CLUSTERS = buildClusters(volcanoes, 400);

  /* ----- 3D CLUSTER CONES -----
     Each cluster gets a real 3D volcano cone planted at its centroid,
     not just the HTML overlay. The cone is sized by member count and
     uses the same magma materials as individual volcanoes — so the
     visual language is unified. Big cone collapses → tiny cones bloom.

     We build these directly as Three.js meshes (rather than using a
     second customLayer) and add them to the scene. Their opacity
     ramps with camera distance, the inverse of the individual cones'
     ramp: clusters are visible far away and fade as you zoom in. */
  const clusterCones = [];
  for (const cluster of CLUSTERS) {
    const group = new THREE.Group();
    // Tag as a cluster cone so the raycaster picker can ignore it
    // (clicks should go through to the HTML overlay above instead)
    group.userData._isClusterCone = true;
    group.userData._cluster = cluster;

    // Size scales with member count — log-ish so 10-site clusters
    // don't dwarf 2-site clusters. A 2-site cluster gets ~2.5x scale,
    // a 10-site cluster gets ~5x.
    const sizeFactor = 1.5 + Math.log(cluster.members.length) * 1.4;
    const bodyHeight = 1.1 * sizeFactor;     // shrunk from 1.6 to match individual cones
    const bodyRadius = 0.4 * sizeFactor;     // shrunk from 0.55

    // Cone body — same material as individual volcanoes for visual unity
    const body = new THREE.Mesh(
      new THREE.ConeGeometry(bodyRadius, bodyHeight, 10, 1, false),
      bodyMaterial
    );
    body.position.y = bodyHeight / 2;
    group.add(body);

    // Glowing peak — colored by the highest-VEI member's status,
    // so an Active cluster with a Tambora in it pulses red while
    // a quiet dormant cluster glows cyan.
    const dominantMember = cluster.members.slice().sort(
      (a, b) => (b.vei || 0) - (a.vei || 0)
    )[0];
    const mats = STATUS_MATERIALS[dominantMember.status]
              || STATUS_MATERIALS.Active;

    const peak = new THREE.Mesh(
      new THREE.SphereGeometry(0.22 * sizeFactor, 14, 14),     // shrunk from 0.30
      mats.core.clone()  // clone so we can fade independently
    );
    peak.position.y = bodyHeight + 0.06;
    group.add(peak);

    // Halo — bigger than usual to make clusters read as "important"
    const halo = new THREE.Mesh(
      new THREE.SphereGeometry(0.5 * sizeFactor, 16, 16),      // shrunk from 0.65
      mats.glow.clone()
    );
    halo.position.y = bodyHeight + 0.06;
    group.add(halo);

    // Position on globe surface, oriented outward like individual cones
    const coords = globe.getCoords(cluster.lat, cluster.lng, 0.005);
    group.position.set(coords.x, coords.y, coords.z);
    group.lookAt(0, 0, 0);
    group.rotateX(-Math.PI / 2);

    // Make the body material a clone too, so we can fade its opacity
    // without affecting individual-volcano cones
    body.material = bodyMaterial.clone();
    body.material.transparent = true;

    globe.scene().add(group);
    clusterCones.push({ group, peak, halo, body, cluster });
  }

  /**
   * Build the HTML element for a cluster marker. The HTML stays as
   * the count badge + label + click target, while the 3D cone above
   * provides the volume. Together they form a single visual unit.
   */
  function buildClusterEl(cluster) {
    const el = document.createElement('div');
    el.className = 'cluster-marker';
    const maxVei = Math.max(...cluster.members.map(m => m.vei || 0));
    el.classList.add(maxVei >= 5 ? 'cluster-major' : 'cluster-minor');
    el.innerHTML = `
      <div class="cluster-count">${cluster.members.length}</div>
      <div class="cluster-label">${cluster.regionLabel}</div>
    `;
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openClusterPopup(cluster, el);
    });
    return el;
  }

  globe
    .htmlElementsData(CLUSTERS)
    .htmlLat('lat')
    .htmlLng('lng')
    .htmlAltitude(0.01)
    .htmlElement(buildClusterEl);

  /**
   * Zoom-aware fade. At overview altitude, the BIG cluster cones are
   * visible and the individual cones underneath are tiny pips. As the
   * camera dives in, the cluster cones fade out and their HTML labels
   * fade with them, while the individual cones bloom (handled by the
   * existing zoom-bloom logic). The crossover happens around alt 1.5.
   *
   *   alt > 2.0  →  cluster cones fully visible
   *   alt 2.0 → 1.0 →  fade out smoothly
   *   alt < 1.0  →  fully hidden
   */
  function updateClusterVisibility() {
    if (!globe || !globe.camera) return;
    const cam = globe.camera();
    if (!cam || !cam.position) return;
    const camDist = cam.position.length() / 100;
    if (!isFinite(camDist) || camDist <= 0) return;
    const opacity = Math.max(0, Math.min(1, (camDist - 1.0) / 1.0));

    // HTML overlays (badges, labels)
    document.querySelectorAll('.cluster-marker').forEach(el => {
      el.style.opacity = String(opacity);
      el.style.pointerEvents = opacity > 0.3 ? 'auto' : 'none';
    });

    // 3D cluster cones — fade body, peak, and halo materials together.
    // The halo gets a slightly steeper falloff so it doesn't linger
    // visibly after the cone itself has dimmed.
    for (const cc of clusterCones) {
      cc.body.material.opacity = opacity * 0.95;
      cc.peak.material.opacity = opacity * 0.95;
      cc.halo.material.opacity = opacity * 0.4;
      cc.group.visible = opacity > 0.01;
    }

    // Close any open popup if the user zooms in past the threshold
    if (opacity < 0.3) closeClusterPopup();
  }
  // Initial cluster visibility is wired up below in the camera-init
  // block, AFTER pointOfView() has been called. Running it here would
  // read a stale camera position and the clusters would render at
  // the wrong opacity on first paint.

  /* ----- INITIAL CAMERA POSITION & AUTO-ROTATION ----- */
  globe.pointOfView({ lat: 20, lng: 30, altitude: 2.4 });

  // NOW that the camera is in its initial position, run the cluster
  // visibility update. Run it on the next animation frame so that
  // pointOfView has propagated to the camera matrix, and again a few
  // frames later as belt-and-suspenders against any slow init.
  requestAnimationFrame(() => {
    updateClusterVisibility();
    requestAnimationFrame(updateClusterVisibility);
  });
  const controls = globe.controls();
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.35;
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 145;   // ~45 units above surface — close enough to inspect a volcano without "falling in"
  controls.maxDistance = 800;

  // Lighting — Globe.gl ships with ambient + directional light, but the
  // directional light is on top of the globe by default which leaves
  // the underside of cone meshes fully dark. Add a second fill light
  // on the opposite side so cones stay readable from any angle.
  const fillLight = new THREE.DirectionalLight(0xffd9b3, 0.4);
  fillLight.position.set(-1, -0.5, -1);
  globe.scene().add(fillLight);


  // Stop auto-rotate as soon as the user touches the globe
  let userHasInteracted = false;
  const stopRotation = () => {
    if (userHasInteracted) return;
    userHasInteracted = true;
    controls.autoRotate = false;
  };
  mount.addEventListener('mousedown', stopRotation);
  mount.addEventListener('touchstart', stopRotation);
  mount.addEventListener('wheel', stopRotation);

  /* ----- RESPONSIVE RESIZE ----- */
  const resize = () => {
    globe.width(window.innerWidth);
    globe.height(window.innerHeight);
  };
  resize();
  window.addEventListener('resize', resize);

  return globe;
}

/* =================================================================
   3. INTERACTION + UI PANEL
   ================================================================= */

let activeGlobe = null;

/* The currently locked-on volcano (object reference) and the full
   dataset, so lockVolcano can find the corresponding mesh and
   unlockVolcano can restore the rings. Both are populated at boot. */
let lockedVolcano = null;
let allVolcanoesRef = null;

/* The currently open cluster popup element (or null). Module-scoped
   so any code path — cluster clicks, zoom-out, ESC, panel close —
   can dismiss it. */
let activeClusterPopup = null;

// All let-declared module-scope variables are now initialized.
// Safe to run applyLanguage() — rerenderI18nDynamic will find them
// as null (nothing locked, no open popup) rather than in TDZ.
applyLanguage();

/**
 * Open a floating popup listing the volcanoes in a cluster. Anchored
 * to the cluster marker's screen position so it appears next to where
 * the user clicked. Each row in the list reuses the visual style of
 * the search-suggestion rows for design consistency, and clicking a
 * row routes through the existing handleVolcanoClick flow — so
 * lock-on, HUD, fly-to, and panel all just work.
 */
function openClusterPopup(cluster, anchorEl) {
  closeClusterPopup();

  const popup = document.createElement('div');
  popup.className = 'cluster-popup';

  // Sort members by VEI descending so the most significant appears
  // first. Stable secondary sort by name for predictability.
  const sorted = [...cluster.members].sort(
    (a, b) => (b.vei || 0) - (a.vei || 0) || a.name.localeCompare(b.name)
  );

  popup.innerHTML = `
    <div class="cluster-popup-header">
      <span class="cluster-popup-title">${cluster.regionLabel}</span>
      <span class="cluster-popup-count">${cluster.members.length} ${t('cluster.sites')}</span>
      <button class="cluster-popup-close" aria-label="Close">×</button>
    </div>
    <ul class="cluster-popup-list">
      ${sorted.map((v, i) => `
        <li class="cluster-popup-item" data-index="${i}">
          <span class="cluster-popup-icon"></span>
          <div class="cluster-popup-text">
            <div class="cluster-popup-name">${v.name}</div>
            <div class="cluster-popup-meta">${tFallback('type', v.type)} · ${t('panel.vei')} ${v.vei || 0} · ${tFallback('status', v.status)}</div>
          </div>
        </li>
      `).join('')}
    </ul>
  `;

  // Position next to the anchor — to its right by default, flipping
  // to the left if it would go off-screen.
  document.body.appendChild(popup);
  const rect = anchorEl.getBoundingClientRect();
  const popupW = 280;
  const goLeft = rect.right + popupW + 16 > window.innerWidth;
  popup.style.left = (goLeft ? rect.left - popupW - 12 : rect.right + 12) + 'px';
  popup.style.top  = Math.max(20, rect.top - 8) + 'px';
  // Fade in
  requestAnimationFrame(() => popup.classList.add('visible'));

  // Wire interactions
  popup.querySelector('.cluster-popup-close').addEventListener('click', closeClusterPopup);
  popup.querySelectorAll('.cluster-popup-item').forEach(li => {
    li.addEventListener('click', () => {
      const v = sorted[Number(li.dataset.index)];
      closeClusterPopup();
      handleVolcanoClick(v);
    });
  });

  activeClusterPopup = popup;
  // Stash the cluster and anchor element so a language change can
  // close-and-reopen the popup with translated meta strings.
  popup._cluster = cluster;
  popup._anchor = anchorEl;
}

function closeClusterPopup() {
  if (!activeClusterPopup) return;
  const p = activeClusterPopup;
  activeClusterPopup = null;
  p.classList.remove('visible');
  setTimeout(() => p.remove(), 200);
}

// Close popup when clicking elsewhere on the page
document.addEventListener('click', (e) => {
  if (activeClusterPopup &&
      !activeClusterPopup.contains(e.target) &&
      !e.target.closest('.cluster-marker')) {
    closeClusterPopup();
  }
});

/**
 * Lock visual state onto a single volcano:
 *   1. Suspend the pinging rings globally — turns the search/click
 *      action into a definitive "lock-on" gesture rather than just
 *      another marker visit.
 *   2. Recolor the locked volcano's peak + halo with the white-hot
 *      "selected" palette, so it stands out from its peers.
 *   3. Fade in the targeting HUD: first in "acquiring" state (corner
 *      brackets larger, scan line sweeping), then transition to
 *      "locked" (frame shrinks to fit, scan line stops, center dot
 *      and target readout fade in) once the camera arrives.
 *
 * The previous lock (if any) is restored to its status color first.
 */
function lockVolcano(volcano) {
  if (!activeGlobe || !volcano) return;
  // Dismiss any open cluster popup — selection has been made
  closeClusterPopup();
  // Tear down any active eruption simulation before locking on to a new volcano
  clearEruptionZones();
  // Restore any previous lock before applying the new one
  if (lockedVolcano && lockedVolcano !== volcano) {
    paintMarker(lockedVolcano, STATUS_MATERIALS_REF[lockedVolcano.status]
                            || STATUS_MATERIALS_REF.Active);
  }
  lockedVolcano = volcano;
  paintMarker(volcano, LOCKED_MATERIALS_REF);
  // NOTE: We used to call activeGlobe.ringsData([]) here to suppress
  // pinging during lock-on. That was causing the customLayer cones to
  // disappear because Globe.gl invalidates other layers when the
  // rings data changes. The white-hot peak paint is sufficient visual
  // signal that something is locked — rings stay alive everywhere.

  // Show targeting HUD: acquiring → locked transition timed roughly
  // to the camera fly duration (2000ms). Cancels any pending lock
  // transition from a prior selection.
  const hud = document.getElementById('crosshair-hud');
  const readout = document.getElementById('hudReadout');
  if (!hud) return;
  if (hud._lockTimer) clearTimeout(hud._lockTimer);
  readout.textContent = t('hud.target') + ' · ' + volcano.name;
  hud.classList.remove('locked');
  hud.classList.add('active');
  hud.setAttribute('aria-hidden', 'false');
  // After the camera arrives, transition to "locked" — frame shrinks,
  // scan line stops, center dot + readout fade in.
  hud._lockTimer = setTimeout(() => {
    hud.classList.add('locked');
  }, 1700);  // slightly before the fly completes for snap feel
}

/**
 * Release the lock — restore the previously-locked volcano's status
 * color and fade out the HUD.
 */
function unlockVolcano() {
  if (!activeGlobe) return;
  if (lockedVolcano) {
    paintMarker(lockedVolcano,
      STATUS_MATERIALS_REF[lockedVolcano.status] || STATUS_MATERIALS_REF.Active);
    lockedVolcano = null;
  }
  // (No more ringsData restoration needed — rings were never removed.)

  // Fade out HUD
  const hud = document.getElementById('crosshair-hud');
  if (hud) {
    if (hud._lockTimer) { clearTimeout(hud._lockTimer); hud._lockTimer = null; }
    hud.classList.remove('active', 'locked');
    hud.setAttribute('aria-hidden', 'true');
  }
}

/**
 * Walk the scene to find the marker group whose userData matches
 * `volcano`, then swap its peak + halo materials in place. Cheaper
 * than rebuilding the marker since material swaps don't disturb
 * geometry, transforms, or the spatial index.
 */
function paintMarker(volcano, mats) {
  if (!activeGlobe || !mats) return;
  activeGlobe.scene().traverse((obj) => {
    if (!obj.userData || obj.userData.lat !== volcano.lat ||
        obj.userData.lng !== volcano.lng ||
        obj.userData.id  !== volcano.id) return;
    obj.children.forEach(child => {
      if (child.userData?._role === 'peak') child.material = mats.core;
      if (child.userData?._role === 'halo') child.material = mats.glow;
    });
  });
}

/* These two are populated by initGlobe and read by the lock helpers
   above. Keeping them as let-bindings at module scope avoids passing
   the globe-internal materials through every function. */
let STATUS_MATERIALS_REF = null;
let LOCKED_MATERIALS_REF = null;

/* In-memory cache so we don't re-hit Wikipedia for the same volcano
   if the user re-clicks. Key: wikiTitle, Value: image URL or null. */
const imageCache = new Map();

/**
 * Fetches a hero image URL for a volcano from Wikipedia's REST API.
 * Returns null on any failure — the caller should already have a
 * fallback gradient in place, so a missing image is graceful.
 *
 * Why Wikipedia? It's a stable, CORS-friendly source with consistent
 * URLs and good imagery for nearly every notable place on Earth.
 * When you swap in your real database later, you can either keep
 * this fetch or store an `image` URL directly on each volcano.
 */
async function fetchVolcanoImage(wikiTitle) {
  if (!wikiTitle) return null;
  if (imageCache.has(wikiTitle)) return imageCache.get(wikiTitle);

  try {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    // Prefer the full-size original; fall back to the thumbnail
    const imgUrl = data.originalimage?.source || data.thumbnail?.source || null;
    imageCache.set(wikiTitle, imgUrl);
    return imgUrl;
  } catch (err) {
    console.warn(`[Magmascope] Could not fetch image for "${wikiTitle}":`, err);
    imageCache.set(wikiTitle, null); // cache the miss too
    return null;
  }
}

/**
 * Click/search handler — flies camera to the volcano, locks the visual
 * state onto it, and opens the info panel. The fly is 2 seconds long
 * to give a strong "drone arriving on target" feel; the lock turns off
 * the global ring pinging so the focused site stands alone.
 */
function handleVolcanoClick(volcano) {
  if (!activeGlobe) return;

  // Stop auto-rotation if it's still on
  activeGlobe.controls().autoRotate = false;

  // Smoothly fly to the volcano. Altitude 0.5 lands us close enough
  // to clearly see the cone marker rising from the terrain, while
  // still keeping a sliver of horizon for context.
  activeGlobe.pointOfView({
    lat: volcano.lat,
    lng: volcano.lng,
    altitude: 0.5
  }, 2000);

  // Apply lock-on visual state (suspends pinging, paints peak white-hot)
  lockVolcano(volcano);

  renderPanel(volcano);
}

/**
 * Build the safety section HTML for a volcano. Active or notable
 * sites get the full block; extinct ones get a single-line note so
 * the section never appears empty. Returns '' when nothing is worth
 * showing (e.g. a non-notable extinct cinder cone) so renderPanel
 * can omit the section entirely.
 */
function renderSafetySection(v) {
  // Skip the section for extinct, non-notable volcanoes — there's
  // nothing actionable to surface, and inserting a "no monitoring"
  // line on every quiet pyroclastic field would be noise.
  if (v.status === 'Extinct' && !v.notable) return '';

  const hazards = HAZARDS_BY_TYPE[v.type] || [];
  const agency = MONITORING_AGENCIES[v.country];

  const hazardChips = hazards
    .map(h => `<span class="safety-tag">${t('hazard.' + h)}</span>`)
    .join('');

  const agencyHTML = agency
    ? (agency.url
        ? `<a href="${agency.url}" target="_blank" rel="noopener noreferrer">${agency.name}</a>`
        : agency.name)
    : t('panel.unmonitored');

  const adviceText = v.status === 'Extinct'
    ? t('panel.adviceExtinct')
    : t('panel.advice');

  return `
    <div class="panel-section safety-block">
      <div class="safety-eyebrow">${t('panel.safety')}</div>
      ${hazards.length ? `
        <div class="safety-row">
          <span class="safety-label">${t('panel.hazards')}</span>
          ${hazardChips}
        </div>
      ` : ''}
      <div class="safety-row">
        <span class="safety-label">${t('panel.monitoring')}</span>
        <span class="safety-agency">${agencyHTML}</span>
      </div>
      <div class="safety-advice">${adviceText}</div>
    </div>
  `;
}

function openLegendInfo() {
  const card = document.getElementById('legendInfoCard');
  const btn = document.getElementById('legendInfoBtn');
  if (!card || !btn) return;
  renderLegendInfoCard();
  card.classList.add('visible');
  card.setAttribute('aria-hidden', 'false');
  btn.setAttribute('aria-expanded', 'true');
}

function closeLegendInfo() {
  const card = document.getElementById('legendInfoCard');
  const btn = document.getElementById('legendInfoBtn');
  if (!card || !btn) return;
  card.classList.remove('visible');
  card.setAttribute('aria-hidden', 'true');
  btn.setAttribute('aria-expanded', 'false');
}

function isLegendInfoOpen() {
  const card = document.getElementById('legendInfoCard');
  return !!(card && card.classList.contains('visible'));
}

// Wire up the toggle. Module-scoped so it runs at script load —
// the legend button is in the static HTML, so it's already in the DOM.
(function wireLegendInfoToggle() {
  const btn = document.getElementById('legendInfoBtn');
  if (!btn) return;
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isLegendInfoOpen()) closeLegendInfo(); else openLegendInfo();
  });
  // Click outside the card or button closes it
  document.addEventListener('click', (e) => {
    if (!isLegendInfoOpen()) return;
    const card = document.getElementById('legendInfoCard');
    if (card && (card.contains(e.target) || btn.contains(e.target))) return;
    closeLegendInfo();
  });
})();

// ============================================================================
// ERUPTION SIMULATOR — geometry helpers
// ============================================================================

/**
 * Build a tessellated spherical cap mesh that sits ε above the globe surface,
 * centered on (latDeg, lngDeg) with the given angular radius (radians).
 *
 * Returns { mesh: THREE.Mesh, edge: THREE.LineLoop } — both already positioned
 * and oriented for adding to the scene.
 *
 * angularRadiusRad = radiusKm / EARTH_RADIUS_KM
 * Cap radius is in Three.js units; pole is placed at (sphereRadius + epsilon).
 */
function buildSphericalCap(latDeg, lngDeg, angularRadiusRad, opts = {}) {
  // `??` (not `||`) so that legitimate zero values for opacity/epsilon are honored.
  const segments    = opts.segments     ?? 64;
  const sphereR     = opts.sphereRadius ?? 100;
  const epsilon     = opts.epsilon      ?? 0.03;
  const color       = opts.color        ?? 0xff5722;
  const opacity     = opts.opacity      ?? 0.4;

  const r = sphereR + epsilon;
  const theta = Math.max(angularRadiusRad, 1e-6);
  const sinTheta = Math.sin(theta);
  const cosTheta = Math.cos(theta);

  // --- Cap mesh (filled disc on sphere surface) ---------------------------
  // Build vertices in a "north-pole" frame: pole at +Y, cap rim at colatitude θ.
  // Then orient the whole thing so the pole points to (latDeg, lngDeg).
  const positions = new Float32Array((segments + 2) * 3);
  positions[0] = 0;
  positions[1] = r;
  positions[2] = 0;
  for (let i = 0; i <= segments; i++) {
    const azimuth = (i / segments) * Math.PI * 2;
    const x = r * sinTheta * Math.cos(azimuth);
    const y = r * cosTheta;
    const z = r * sinTheta * Math.sin(azimuth);
    positions[(i + 1) * 3 + 0] = x;
    positions[(i + 1) * 3 + 1] = y;
    positions[(i + 1) * 3 + 2] = z;
  }

  const indices = [];
  for (let i = 1; i <= segments; i++) {
    indices.push(0, i, i + 1);
  }

  const capGeo = new THREE.BufferGeometry();
  capGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  capGeo.setIndex(indices);
  capGeo.computeVertexNormals();

  const capMat = new THREE.MeshBasicMaterial({
    color, opacity,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.NormalBlending
  });
  const mesh = new THREE.Mesh(capGeo, capMat);

  // --- Edge ring (great-circle line at the cap rim) -----------------------
  const edgePositions = new Float32Array(segments * 3);
  for (let i = 0; i < segments; i++) {
    const azimuth = (i / segments) * Math.PI * 2;
    edgePositions[i * 3 + 0] = r * sinTheta * Math.cos(azimuth);
    edgePositions[i * 3 + 1] = r * cosTheta;
    edgePositions[i * 3 + 2] = r * sinTheta * Math.sin(azimuth);
  }
  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
  const edgeMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 1.0 });
  const edge = new THREE.LineLoop(edgeGeo, edgeMat);

  // --- Orient the cap so its pole points to (latDeg, lngDeg) --------------
  // Globe.gl's lat/lng convention (0,0 → +X, +Y = north pole) means we rotate
  // a +Y-pole local frame onto the target lat/lng vector.
  const colat  = (90 - latDeg) * Math.PI / 180;   // colatitude from +Y
  const lambda = lngDeg        * Math.PI / 180;
  const target = new THREE.Vector3(
    Math.sin(colat) * Math.cos(lambda),
    Math.cos(colat),
    Math.sin(colat) * Math.sin(lambda)
  );
  const yAxis = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(yAxis, target);
  mesh.quaternion.copy(quat);
  edge.quaternion.copy(quat);

  return { mesh, edge };
}

/**
 * Surface area of a spherical cap of angular radius θ (radians) on Earth.
 * area = 2π · R² · (1 − cos θ).  Returns km².
 */
function areaForCapKm2(angularRadiusRad) {
  const R = EARTH_RADIUS_KM;
  return 2 * Math.PI * R * R * (1 - Math.cos(angularRadiusRad));
}

/**
 * Returns { innerKm, middleKm, outerKm } for a volcano,
 * preferring an override entry, falling back to ERUPTION_VEI_RADII[v.vei].
 */
function getZoneRadiiFor(v) {
  const o = ERUPTION_OVERRIDES[v.id];
  if (o && o.zones) return { ...o.zones };
  const tier = ERUPTION_VEI_RADII[v.vei] || ERUPTION_VEI_RADII[3];
  return { innerKm: tier[0], middleKm: tier[1], outerKm: tier[2] };
}

/**
 * Returns { inner, middle, outer } population estimates. Prefers override,
 * falls back to country-density × cap area.
 */
function getPopulationFor(v) {
  const o = ERUPTION_OVERRIDES[v.id];
  if (o && o.population) return { ...o.population };
  const { innerKm, middleKm, outerKm } = getZoneRadiiFor(v);
  const density = (POP_DENSITY_BY_COUNTRY[v.country] !== undefined)
    ? POP_DENSITY_BY_COUNTRY[v.country]
    : POP_DENSITY_BY_COUNTRY._default;
  // Flat-disc area (km²). Spherical-cap correction is < 0.2 % under 400 km radius
  // and ~2.5 % at VEI 8's 1500 km — acceptable for a rough population estimate.
  const areaInner  = Math.PI * innerKm  * innerKm;
  const areaMiddle = Math.PI * middleKm * middleKm - areaInner;
  const areaOuter  = Math.PI * outerKm  * outerKm  - Math.PI * middleKm * middleKm;
  return {
    inner:  Math.round(density * areaInner),
    middle: Math.round(density * areaMiddle),
    outer:  Math.round(density * areaOuter)
  };
}

function getCitiesFor(v) {
  const o = ERUPTION_OVERRIDES[v.id];
  return (o && o.cities) ? o.cities : null;
}

/**
 * Returns the aftereffects HTML (already i18n-resolved) for a volcano.
 * Curated overrides return a single curated paragraph; otherwise base tier
 * paragraph + conditional clauses concatenated.
 */
function getAftereffectsFor(v) {
  const o = ERUPTION_OVERRIDES[v.id];
  if (o && o.aftereffects) return `<p>${t(o.aftereffects)}</p>`;

  const parts = [];
  parts.push(t(ERUPTION_AFTEREFFECTS_TIER_KEYS[v.vei] || ERUPTION_AFTEREFFECTS_TIER_KEYS[3]));

  if (v.type === 'Caldera' && v.lat >= -30 && v.lat <= 30) {
    parts.push(t('eruption.aftereffects.tsunami'));
  }
  if ((v.type || '').includes('Stratovolcano') && v.elevation > 3000) {
    parts.push(t('eruption.aftereffects.lahar'));
  }
  if (v.vei >= 6) {
    parts.push(t('eruption.aftereffects.climate'));
  }
  if (v.vei >= 5) {
    parts.push(t('eruption.aftereffects.aviation'));
  }
  return parts.map(p => `<p>${p}</p>`).join('');
}

/**
 * Find the existing cluster cone for a volcano. Returns the THREE.Mesh or null.
 */
function findConeFor(volcanoId) {
  if (!Array.isArray(clusterCones)) return null;
  return clusterCones.find(c => c.userData && c.userData.volcanoId === volcanoId) || null;
}

function pulseConeFor(volcanoId) {
  const cone = findConeFor(volcanoId);
  if (!cone || !cone.material) return null;
  const m = cone.material;
  // Only mutate if we can capture the original — otherwise we couldn't restore it.
  // Returning null means "no pulse applied; nothing to restore".
  if (!m.emissive || !m.emissive.clone || !m.emissive.set) return null;
  const originalEmissive = m.emissive.clone();
  m.emissive.set(0xff5722);
  m.needsUpdate = true;
  return originalEmissive;
}

function restoreConeFor(volcanoId, originalEmissive) {
  const cone = findConeFor(volcanoId);
  if (!cone || !cone.material) return;
  if (originalEmissive && cone.material.emissive && cone.material.emissive.copy) {
    cone.material.emissive.copy(originalEmissive);
    cone.material.needsUpdate = true;
  }
}

/**
 * Spawn a 3-zone eruption for a volcano. Idempotent: clears any prior sim first.
 * Mutates module-level activeEruption.
 */
function spawnEruptionAt(v) {
  clearEruptionZones();

  const { innerKm, middleKm, outerKm } = getZoneRadiiFor(v);
  const targets = [
    { name: 'inner',  km: innerKm,  style: ERUPTION_ZONE_STYLES.inner  },
    { name: 'middle', km: middleKm, style: ERUPTION_ZONE_STYLES.middle },
    { name: 'outer',  km: outerKm,  style: ERUPTION_ZONE_STYLES.outer }
  ];

  const group = new THREE.Group();
  group.userData = { _isEruptionZones: true, volcanoId: v.id };

  const caps = [];
  for (const z of targets) {
    const built = buildSphericalCap(v.lat, v.lng, z.km / EARTH_RADIUS_KM, {
      color:   z.style.color,
      opacity: z.style.opacity,
      epsilon: z.style.epsilon
    });
    group.add(built.mesh);
    group.add(built.edge);
    caps.push({
      name: z.name,
      mesh: built.mesh,
      edge: built.edge,
      targetRad: z.km / EARTH_RADIUS_KM,
      style: z.style,
      lat: v.lat,
      lng: v.lng
    });
  }

  globe.scene().add(group);

  const originalConeEmissive = pulseConeFor(v.id);

  activeEruption = {
    volcanoId: v.id,
    group,
    caps,
    startTime: performance.now(),
    animFrameId: null,
    originalConeEmissive
  };

  runEruptionAnimation();
}

/**
 * RAF loop. Updates each cap's geometry to its eased current radius until
 * t >= 1, then stops scheduling further frames.
 */
function runEruptionAnimation() {
  if (!activeEruption) return;
  const DURATION = 1800;
  const PULSE_DURATION = 1000;

  const tick = (now) => {
    if (!activeEruption) return;
    const elapsed = now - activeEruption.startTime;
    const t = Math.min(1, elapsed / DURATION);

    activeEruption.caps.forEach((cap, i) => {
      const delay = i * 0.15;
      const localT = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
      const eased = 1 - Math.pow(1 - localT, 3);
      const angularRad = Math.max(1e-6, cap.targetRad * eased);
      const rebuilt = buildSphericalCap(cap.lat, cap.lng, angularRad, {
        color:   cap.style.color,
        opacity: cap.style.opacity,
        epsilon: cap.style.epsilon
      });
      cap.mesh.geometry.dispose();
      cap.mesh.geometry = rebuilt.mesh.geometry;
      cap.edge.geometry.dispose();
      cap.edge.geometry = rebuilt.edge.geometry;
      rebuilt.mesh.material.dispose();
      rebuilt.edge.material.dispose();
    });

    if (elapsed >= PULSE_DURATION && activeEruption.originalConeEmissive !== undefined) {
      restoreConeFor(activeEruption.volcanoId, activeEruption.originalConeEmissive);
      activeEruption.originalConeEmissive = undefined;
    }

    if (t < 1) {
      activeEruption.animFrameId = requestAnimationFrame(tick);
    } else {
      activeEruption.animFrameId = null;
    }
  };

  activeEruption.animFrameId = requestAnimationFrame(tick);
}

/**
 * Tear down any active eruption sim. Safe to call when none is active.
 */
function clearEruptionZones() {
  if (!activeEruption) return;

  if (activeEruption.animFrameId !== null) {
    cancelAnimationFrame(activeEruption.animFrameId);
  }

  if (activeEruption.originalConeEmissive !== undefined) {
    restoreConeFor(activeEruption.volcanoId, activeEruption.originalConeEmissive);
  }

  globe.scene().remove(activeEruption.group);
  activeEruption.group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });

  activeEruption = null;
}

/**
 * Build the HTML for the eruption damage report. Used by renderPanel when
 * called with mode === 'eruption'.
 */
function renderEruptionModeBody(v) {
  const { innerKm, middleKm, outerKm } = getZoneRadiiFor(v);
  const angInner  = innerKm  / EARTH_RADIUS_KM;
  const angMiddle = middleKm / EARTH_RADIUS_KM;
  const angOuter  = outerKm  / EARTH_RADIUS_KM;
  const aInner    = areaForCapKm2(angInner);
  const aMiddle   = areaForCapKm2(angMiddle);
  const aOuter    = areaForCapKm2(angOuter);

  const fmtKm = n => n >= 100 ? n.toLocaleString(undefined, {maximumFractionDigits: 0}) :
                     n >= 10  ? n.toFixed(0) :
                                n.toFixed(1);
  const fmtArea = n => n.toLocaleString(undefined, {maximumFractionDigits: 0});
  const fmtPop = n => {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(n >= 10_000_000 ? 0 : 1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(n >= 100_000 ? 0 : 1) + 'K';
    return n.toLocaleString();
  };

  const tier = t(ERUPTION_TIER_KEYS[v.vei] || ERUPTION_TIER_KEYS[3]);
  const banner = `
    <div class="eruption-banner">
      <div class="eruption-banner-text">
        <span class="eruption-banner-title">${tier} · ${t('panel.eruptionBannerTitle')}</span>
        <span class="eruption-banner-sub">${t('panel.eruptionBannerSub').replace('{vei}', String(v.vei))}</span>
      </div>
      <button class="reset-button" id="resetEruption">${t('panel.resetButton')}</button>
    </div>
  `;

  const zoneTable = `
    <div class="panel-section">
      <div class="zone-summary">
        <div class="zone-summary-header">${t('panel.zoneHeader')}</div>
        <div class="zone-summary-header" style="text-align:right">${t('panel.zoneRadius')}</div>
        <div class="zone-summary-header" style="text-align:right">${t('panel.zoneArea')}</div>

        <div class="zone-row-name"><span class="zone-swatch zone-swatch-inner"></span>${t('panel.zoneInner')}</div>
        <div class="zone-row-radius">${fmtKm(innerKm)} km</div>
        <div class="zone-row-area">${fmtArea(aInner)} km²</div>

        <div class="zone-row-name"><span class="zone-swatch zone-swatch-middle"></span>${t('panel.zoneMiddle')}</div>
        <div class="zone-row-radius">${fmtKm(middleKm)} km</div>
        <div class="zone-row-area">${fmtArea(aMiddle)} km²</div>

        <div class="zone-row-name"><span class="zone-swatch zone-swatch-outer"></span>${t('panel.zoneOuter')}</div>
        <div class="zone-row-radius">${fmtKm(outerKm)} km</div>
        <div class="zone-row-area">${fmtArea(aOuter)} km²</div>
      </div>
    </div>
  `;

  const pop = getPopulationFor(v);
  const isAntarctica = v.country === 'Antarctica';
  const popFootnote = isAntarctica
    ? `<div class="pop-footnote">${t('panel.populationAntarctica')}</div>`
    : (ERUPTION_OVERRIDES[v.id] && ERUPTION_OVERRIDES[v.id].population)
      ? ''
      : `<div class="pop-footnote">${t('panel.populationFootnote')}</div>`;
  const popBlock = `
    <div class="panel-section">
      <div class="description-eyebrow">${t('panel.populationAtRisk')}</div>
      <div class="pop-chips">
        <span class="pop-chip"><strong>${t('panel.zoneInner')}:</strong> ${fmtPop(pop.inner)}</span>
        <span class="pop-chip"><strong>${t('panel.zoneMiddle')}:</strong> ${fmtPop(pop.middle)}</span>
        <span class="pop-chip"><strong>${t('panel.zoneOuter')}:</strong> ${fmtPop(pop.outer)}</span>
      </div>
      ${popFootnote}
    </div>
  `;

  const cities = getCitiesFor(v);
  const citiesBlock = cities ? `
    <div class="panel-section">
      <div class="description-eyebrow">${t('panel.citiesAffected')}</div>
      ${cities.inner && cities.inner.length ? `
        <div class="cities-zone-heading">${t('panel.zoneInner')}</div>
        <ul class="cities-list">${cities.inner.map(c => `<li>${c}</li>`).join('')}</ul>
      ` : ''}
      ${cities.middle && cities.middle.length ? `
        <div class="cities-zone-heading">${t('panel.zoneMiddle')}</div>
        <ul class="cities-list">${cities.middle.map(c => `<li>${c}</li>`).join('')}</ul>
      ` : ''}
      ${cities.outer && cities.outer.length ? `
        <div class="cities-zone-heading">${t('panel.zoneOuter')}</div>
        <ul class="cities-list">${cities.outer.map(c => `<li>${c}</li>`).join('')}</ul>
      ` : ''}
    </div>
  ` : '';

  const aftereffectsBlock = `
    <div class="panel-section">
      <div class="description-eyebrow">${t('panel.aftereffects')}</div>
      <div class="aftereffects-block">${getAftereffectsFor(v)}</div>
    </div>
  `;

  const footer = `
    <div class="panel-section">
      <div class="footer-disclaimer">${t('panel.footerDisclaimer')}</div>
    </div>
  `;

  return banner + zoneTable + popBlock + citiesBlock + aftereffectsBlock + footer;
}

/**
 * Renders the info panel. Every volcano gets a hero backdrop image
 * (lazy-loaded from Wikipedia); notable volcanoes additionally get
 * the rich historical description block.
 *
 * opts.mode: 'eruption' renders the post-eruption damage report instead
 * of the standard description body.
 */
function renderPanel(v, opts = {}) {
  const panel = document.getElementById('infoPanel');
  const inner = document.getElementById('panelInner');

  const fmtLat = `${Math.abs(v.lat).toFixed(3)}° ${v.lat >= 0 ? 'N' : 'S'}`;
  const fmtLng = `${Math.abs(v.lng).toFixed(3)}° ${v.lng >= 0 ? 'E' : 'W'}`;

  const isEruption = opts.mode === 'eruption';

  const descriptionHTML = (!isEruption && v.notable && v.description)
    ? `
      <div class="panel-section description-block">
        <div class="description-eyebrow">Historical Significance</div>
        ${v.description.map(p => `<p class="description-text">${p}</p>`).join('')}
      </div>
    `
    : '';

  const simulateButtonHTML = (!isEruption && v.status === 'Active')
    ? `<button class="simulate-button" id="simulateBtn">${t('panel.simulateButton')}</button>`
    : '';

  const standardBody = isEruption ? '' : `
    <div class="panel-section eruption-block">
      <div class="eruption-label">${t('panel.lastEruption')}</div>
      <div class="eruption-value">${v.lastEruption}</div>
    </div>

    <div class="panel-section data-grid">
      <div class="data-cell">
        <div class="data-label">${t('panel.latitude')}</div>
        <div class="data-value">${fmtLat}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">${t('panel.longitude')}</div>
        <div class="data-value">${fmtLng}</div>
      </div>
      <div class="data-cell">
        <div class="data-label">${t('panel.elevation')}</div>
        <div class="data-value">${v.elevation.toLocaleString()} m</div>
      </div>
      <div class="data-cell">
        <div class="data-label">${t('panel.vei')}</div>
        <div class="data-value data-value-accent">${v.vei} / 8</div>
      </div>
    </div>

    ${renderSafetySection(v)}

    ${simulateButtonHTML}

    ${descriptionHTML}
  `;

  const eruptionBody = isEruption ? renderEruptionModeBody(v) : '';

  inner.innerHTML = `
    <div class="panel-hero" id="panelHero">
      <img class="panel-hero-img" id="panelHeroImg" alt="" />
      <span class="panel-hero-credit" id="panelHeroCredit">${t('panel.photoCredit')}</span>
    </div>

    <div class="panel-header">
      <span class="panel-tag">${t('panel.record')} · ${v.id.toUpperCase()}</span>
      <button class="close-btn" id="closePanel" aria-label="Close panel">×</button>
    </div>

    <div class="panel-section">
      <h2 class="volcano-name">${v.name}</h2>
      <div class="volcano-location">${v.region} · ${tFallback('country', v.country)}</div>
      <div class="status-row">
        <span class="chip chip-active">${tFallback('status', v.status)}</span>
        <span class="chip">${tFallback('type', v.type)}</span>
        ${v.notable ? `<span class="chip chip-notable">${t('panel.historic')}</span>` : ''}
      </div>
    </div>

    ${standardBody}
    ${eruptionBody}
  `;

  panel.classList.toggle('is-notable', !!v.notable);
  panel.classList.toggle('is-eruption', isEruption);
  panel.classList.add('active');
  panel.setAttribute('aria-hidden', 'false');

  document.getElementById('closePanel').addEventListener('click', closePanel);

  const simBtn = document.getElementById('simulateBtn');
  if (simBtn) {
    simBtn.addEventListener('click', () => {
      simBtn.disabled = true;
      spawnEruptionAt(v);
      renderPanel(v, { mode: 'eruption' });
    });
  }

  const resetBtn = document.getElementById('resetEruption');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      clearEruptionZones();
      renderPanel(v);
    });
  }

  loadHeroImage(v);
}

/**
 * Re-render dynamic UI that contains translated strings. Called from
 * applyLanguage() whenever the user switches between EN and RO.
 *
 * The HUD readout, info panel, tooltip text, and cluster popup all
 * embed translated strings inside their HTML. They were rendered in
 * whatever language was active at the time they opened — switching
 * languages without this function would leave them stuck on the old
 * language until the user re-opened them.
 */
function rerenderI18nDynamic() {
  // Re-render info panel if open
  if (lockedVolcano) {
    renderPanel(lockedVolcano);
  }
  // Re-render the legend info card while it's open so VEI tiers,
  // status descriptions, and section titles all swap language.
  if (typeof isLegendInfoOpen === 'function' && isLegendInfoOpen()) {
    renderLegendInfoCard();
  }
  // Update HUD readout if visible
  const hud = document.getElementById('crosshair-hud');
  const readout = document.getElementById('hudReadout');
  if (lockedVolcano && hud && hud.classList.contains('active') && readout) {
    readout.textContent = t('hud.target') + ' · ' + lockedVolcano.name;
  }
  // Re-render cluster popup if open
  if (activeClusterPopup && activeClusterPopup._cluster) {
    const cluster = activeClusterPopup._cluster;
    const anchor = activeClusterPopup._anchor;
    closeClusterPopup();
    if (anchor) openClusterPopup(cluster, anchor);
  }
  // Re-fire any in-progress search to refresh suggestion meta
  const searchInput = document.getElementById('volcanoSearch');
  if (searchInput && searchInput.value) {
    searchInput.dispatchEvent(new Event('input'));
  }
}

/**
 * Fetches and applies the hero backdrop. Runs after the panel is
 * already on screen so the user never waits on a network request.
 */
async function loadHeroImage(v) {
  const imgEl = document.getElementById('panelHeroImg');
  const credit = document.getElementById('panelHeroCredit');
  if (!imgEl) return;

  const url = await fetchVolcanoImage(v.wikiTitle);
  if (!url) return; // Keep gradient fallback

  // Pre-load so we only swap once it's actually decoded
  const probe = new Image();
  probe.onload = () => {
    imgEl.src = url;
    imgEl.classList.add('loaded');
    credit?.classList.add('visible');
  };
  probe.onerror = () => {
    // Network or CORS issue — gradient fallback stays visible
    console.warn(`[Magmascope] Image failed to decode: ${url}`);
  };
  probe.src = url;
}

function closePanel() {
  clearEruptionZones();
  const panel = document.getElementById('infoPanel');
  panel.classList.remove('active');
  panel.setAttribute('aria-hidden', 'true');
  // Releasing focus also releases the visual lock — rings come back,
  // and the previously-locked volcano returns to its status color.
  unlockVolcano();
}

/* ESC key — four-stage dismissal:
   1. close cluster popup if open
   2. close the autocomplete dropdown if it's open
   3. otherwise clear the search input if it has text
   4. otherwise close the info panel */
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (typeof isLegendInfoOpen === 'function' && isLegendInfoOpen()) {
    closeLegendInfo();
    return;
  }
  if (activeClusterPopup) { closeClusterPopup(); return; }
  const search = document.getElementById('volcanoSearch');
  const container = search?.parentElement;
  if (container?.classList.contains('has-suggestions')) {
    container.classList.remove('has-suggestions');
    return;
  }
  if (search && search.value) {
    search.value = '';
    search.dispatchEvent(new Event('input'));
    search.blur();
    return;
  }
  closePanel();
});

/* =================================================================
   4. BOOT
   ================================================================= */
(async function boot() {
  const mount = document.getElementById('globeViz');
  const loader = document.getElementById('loader');

  try {
    const volcanoes = await loadVolcanoes();
    allVolcanoesRef = volcanoes;          // for unlockVolcano() to restore rings
    activeGlobe = initGlobe(mount, volcanoes);

    // ---- Stats counters ----
    // statCount tracks the *visible* set so the number reflects search
    // results in real time. statActive shows how many of those visible
    // sites are currently active — a more useful pairing now that
    // every entry has a description.
    const statCount = document.getElementById('statCount');
    const statActive = document.getElementById('statActive');
    const updateStats = (visible) => {
      statCount.textContent = String(visible.length).padStart(2, '0');
      statActive.textContent = String(
        visible.filter(v => v.status === 'Active').length
      ).padStart(2, '0');
    };
    updateStats(volcanoes);

    // ---- Search wiring ----
    const searchInput = document.getElementById('volcanoSearch');
    const searchClear = document.getElementById('searchClear');
    const suggestionsEl = document.getElementById('searchSuggestions');
    const searchContainer = searchInput.parentElement;
    let activeSuggestionIndex = -1;
    let currentSuggestions = [];

    /**
     * Apply a search term to the globe (filters markers + rings).
     * Empty term = full dataset. Skips the rebuild if the resulting
     * set is identical to what's currently mounted (e.g. when the
     * user types a few letters that haven't changed the result list).
     */
    /**
     * Apply a search term to the globe. Instead of filtering the
     * customLayer (which destroys and rebuilds cone meshes — the root
     * cause of the "volcanoes disappear" bugs), we keep all 226 cones
     * permanently mounted and just dim/brighten them based on whether
     * they match the search term. No layer rebuild, no race condition.
     */
    const applySearch = (term) => {
      term = term.trim().toLowerCase();
      const matched = !term
        ? volcanoes
        : volcanoes.filter(v =>
            [v.name, v.country, v.region, v.type].some(
              s => s && s.toLowerCase().includes(term)
            )
          );

      // Build a fast-lookup set of matched IDs for the scene traversal
      const matchedIds = new Set(matched.map(v => v.id));

      // Walk the scene and adjust cone visibility per match status.
      // We never call customLayerData here — the meshes stay put.
      activeGlobe.scene().traverse((obj) => {
        const ud = obj.userData;
        if (!ud || ud._importance === undefined || !ud.id) return;
        const isMatch = !term || matchedIds.has(ud.id);
        // We control visibility via the .visible flag (cleanest) and
        // also keep scale at the zoom factor. No material swaps —
        // those would conflict with the lock-on white-hot paint.
        obj.visible = isMatch;
      });

      updateStats(matched);

      // Visual state for the search box itself
      searchContainer.classList.toggle('has-value', term.length > 0);
      searchContainer.classList.toggle(
        'no-results',
        term.length > 0 && matched.length === 0
      );
    };

    /**
     * Wraps the matched substring of `text` in a span so it can be
     * styled differently. Case-insensitive match. Keeps the original
     * casing of the source text in the output.
     */
    const highlightMatch = (text, term) => {
      if (!term) return escapeHtml(text);
      const idx = text.toLowerCase().indexOf(term);
      if (idx === -1) return escapeHtml(text);
      return (
        escapeHtml(text.slice(0, idx)) +
        '<span class="suggestion-match">' +
          escapeHtml(text.slice(idx, idx + term.length)) +
        '</span>' +
        escapeHtml(text.slice(idx + term.length))
      );
    };
    const escapeHtml = (s) =>
      s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));

    /**
     * Build the dropdown list of suggestions. Ranks results so that
     * matches at the start of a name appear before mid-string matches,
     * which feels more like real-world autocomplete behavior.
     */
    const renderSuggestions = (term) => {
      term = term.trim().toLowerCase();
      if (!term) {
        searchContainer.classList.remove('has-suggestions');
        currentSuggestions = [];
        return;
      }

      // Score each volcano: 3 = name starts with, 2 = name contains,
      // 1 = country/region/type contains. Higher scores rank first.
      const scored = volcanoes
        .map(v => {
          const name = v.name.toLowerCase();
          const country = v.country.toLowerCase();
          const region = (v.region || '').toLowerCase();
          const type = v.type.toLowerCase();
          let score = 0;
          if (name.startsWith(term))      score = 3;
          else if (name.includes(term))   score = 2;
          else if (country.includes(term) ||
                   region.includes(term) ||
                   type.includes(term))   score = 1;
          return { v, score };
        })
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score || a.v.name.localeCompare(b.v.name))
        .slice(0, 8) // cap at 8 suggestions for a tidy dropdown
        .map(x => x.v);

      currentSuggestions = scored;
      activeSuggestionIndex = scored.length > 0 ? 0 : -1;

      if (!scored.length) {
        suggestionsEl.innerHTML =
          '<li class="suggestion-empty">No volcanoes match that query</li>';
      } else {
        suggestionsEl.innerHTML = scored.map((v, i) => `
          <li class="search-suggestion ${i === 0 ? 'active' : ''}"
              role="option"
              data-index="${i}">
            <span class="suggestion-icon ${v.notable ? '' : 'dim'}"></span>
            <div class="suggestion-text">
              <div class="suggestion-name">${highlightMatch(v.name, term)}</div>
              <div class="suggestion-meta">
                ${highlightMatch(tFallback('country', v.country), term)} ·
                ${highlightMatch(tFallback('type', v.type), term)}
              </div>
            </div>
          </li>
        `).join('');
      }

      searchContainer.classList.add('has-suggestions');
    };

    /**
     * Pick a volcano from the dropdown — closes dropdown, clears the
     * search box and any filter highlighting, then flies the camera.
     * The cleared input is more in line with how Google Earth, Maps,
     * and similar interfaces work: select a result and the box is
     * empty again, ready for the next query.
     */
    const selectVolcano = (volcano) => {
      if (!volcano) return;
      searchInput.value = '';
      searchContainer.classList.remove('has-suggestions', 'has-value', 'no-results');
      searchInput.blur();
      // Clear search highlighting so all cones are visible again
      applySearch('');
      handleVolcanoClick(volcano);
    };

    /**
     * Update the .active class on the dropdown list to reflect the
     * keyboard-selected suggestion index.
     */
    const updateActiveSuggestion = () => {
      const items = suggestionsEl.querySelectorAll('.search-suggestion');
      items.forEach((el, i) => {
        el.classList.toggle('active', i === activeSuggestionIndex);
        if (i === activeSuggestionIndex) {
          el.scrollIntoView({ block: 'nearest' });
        }
      });
    };

    // Input — both filters the globe and updates the dropdown
    searchInput.addEventListener('input', (e) => {
      const value = e.target.value;
      applySearch(value);
      renderSuggestions(value);
    });

    // Show dropdown again on focus if there's already text
    searchInput.addEventListener('focus', (e) => {
      if (e.target.value.trim()) renderSuggestions(e.target.value);
    });

    // Keyboard navigation: arrow keys move highlight, Enter selects,
    // Escape closes the dropdown (handled by the global ESC handler).
    searchInput.addEventListener('keydown', (e) => {
      const open = searchContainer.classList.contains('has-suggestions');
      if (e.key === 'ArrowDown') {
        if (!open || !currentSuggestions.length) return;
        e.preventDefault();
        activeSuggestionIndex =
          (activeSuggestionIndex + 1) % currentSuggestions.length;
        updateActiveSuggestion();
      } else if (e.key === 'ArrowUp') {
        if (!open || !currentSuggestions.length) return;
        e.preventDefault();
        activeSuggestionIndex =
          (activeSuggestionIndex - 1 + currentSuggestions.length) %
          currentSuggestions.length;
        updateActiveSuggestion();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        // Prefer the highlighted suggestion, but if none is highlighted
        // (or list is closed), fly to the first match by name.
        if (open && currentSuggestions.length) {
          selectVolcano(currentSuggestions[activeSuggestionIndex] || currentSuggestions[0]);
        } else {
          const term = searchInput.value.trim().toLowerCase();
          if (!term) return;
          const match = volcanoes.find(v =>
            v.name.toLowerCase().includes(term)
          );
          if (match) selectVolcano(match);
        }
      }
    });

    // Click anywhere on a suggestion to fly to it
    suggestionsEl.addEventListener('mousedown', (e) => {
      // mousedown (not click) so the input doesn't blur first and
      // prematurely close the dropdown
      const item = e.target.closest('.search-suggestion');
      if (!item) return;
      e.preventDefault();
      const idx = Number(item.dataset.index);
      selectVolcano(currentSuggestions[idx]);
    });

    // Hovering a suggestion previews it as the active one
    suggestionsEl.addEventListener('mouseover', (e) => {
      const item = e.target.closest('.search-suggestion');
      if (!item) return;
      activeSuggestionIndex = Number(item.dataset.index);
      updateActiveSuggestion();
    });

    // Close dropdown when focus leaves the search container
    searchInput.addEventListener('blur', () => {
      // Slight delay so a click inside the dropdown still registers
      setTimeout(() => {
        searchContainer.classList.remove('has-suggestions');
      }, 150);
    });

    // Clear button — wipe input, reset filter, close dropdown
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      applySearch('');
      searchContainer.classList.remove('has-suggestions');
      searchInput.focus();
    });

    // Hide loader once the renderer has had a moment to draw the first
    // frame (tiny delay prevents a visible flash).
    setTimeout(() => loader.classList.add('hidden'), 600);
  } catch (err) {
    console.error('Failed to initialize observatory:', err);
    loader.querySelector('.loader-text').textContent = 'Initialization failed.';
  }
})();
</script>

</body>
</html>
